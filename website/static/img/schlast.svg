<svg width="900" height="550" xmlns="http://www.w3.org/2000/svg">

  <rect width="100%" height="100%" fill="#f5f5f5"></rect>

  <!-- STM32 -->
  <rect x="350" y="50" width="200" height="100" rx="10" fill="#90caf9" stroke="#0d47a1" stroke-width="2"></rect>
  <text x="450" y="100" text-anchor="middle" font-size="16">STM32 Nucleo</text>

  <!-- Breadboard -->
  <rect x="200" y="200" width="500" height="120" rx="10" fill="#eeeeee" stroke="black" stroke-width="2"></rect>
  <text x="450" y="260" text-anchor="middle" font-size="16">Breadboard</text>

  <!-- Sensor -->
  <rect x="50" y="220" width="120" height="80" rx="10" fill="#a5d6a7" stroke="#1b5e20"></rect>
  <text x="110" y="260" text-anchor="middle" font-size="12">Sensor</text>

  <!-- NFC -->
  <rect x="50" y="350" width="120" height="80" rx="10" fill="#a5d6a7" stroke="#1b5e20"></rect>
  <text x="110" y="390" text-anchor="middle" font-size="12">NFC RC522</text>

  <!-- Servo -->
  <rect x="730" y="220" width="120" height="80" rx="10" fill="#ffcc80" stroke="#e65100"></rect>
  <text x="790" y="260" text-anchor="middle" font-size="12">Servo</text>

  <!-- LED -->
  <rect x="730" y="350" width="120" height="80" rx="10" fill="#ffcc80" stroke="#e65100"></rect>
  <text x="790" y="390" text-anchor="middle" font-size="12">LED</text>

  <!-- Connections -->
  <line x1="450" y1="150" x2="450" y2="200" stroke="black" stroke-width="2"></line>
  
  <line x1="200" y1="260" x2="170" y2="260" stroke="black" stroke-width="2"></line>
  <line x1="200" y1="260" x2="170" y2="390" stroke="black" stroke-width="2"></line>

  <line x1="700" y1="260" x2="730" y2="260" stroke="black" stroke-width="2"></line>
  <line x1="700" y1="260" x2="730" y2="390" stroke="black" stroke-width="2"></line>

</svg>