<svg width="900" height="500" xmlns="http://www.w3.org/2000/svg">

  <rect width="100%" height="100%" fill="#f5f5f5"></rect>

  <!-- STM32 -->
  <rect x="320" y="180" width="260" height="140" rx="15" fill="#cfd8dc" stroke="#1565c0" stroke-width="3"></rect>
  <text x="450" y="240" text-anchor="middle" font-size="20" fill="#0d47a1">STM32 Nucleo</text>
  <text x="450" y="270" text-anchor="middle" font-size="14">(Programmed in Rust)</text>

  <!-- Sensor -->
  <rect x="50" y="80" width="220" height="90" rx="10" fill="#c8e6c9" stroke="#1b5e20" stroke-width="2"></rect>
  <text x="160" y="120" text-anchor="middle" font-size="14">Proximity Sensor</text>
  <text x="160" y="140" text-anchor="middle" font-size="12">(Ultrasonic/IR)</text>

  <!-- NFC -->
  <rect x="50" y="280" width="220" height="90" rx="10" fill="#c8e6c9" stroke="#1b5e20" stroke-width="2"></rect>
  <text x="160" y="320" text-anchor="middle" font-size="14">NFC Module (RC522)</text>
  <text x="160" y="340" text-anchor="middle" font-size="12">(NFC crate)</text>

  <!-- Servo -->
  <rect x="630" y="80" width="220" height="90" rx="10" fill="#ffe0b2" stroke="#e65100" stroke-width="2"></rect>
  <text x="740" y="120" text-anchor="middle" font-size="14">Servo Motor</text>
  <text x="740" y="140" text-anchor="middle" font-size="12">(Lid Control)</text>

  <!-- LED -->
  <rect x="630" y="280" width="220" height="90" rx="10" fill="#ffe0b2" stroke="#e65100" stroke-width="2"></rect>
  <text x="740" y="320" text-anchor="middle" font-size="14">LED Indicators</text>
  <text x="740" y="340" text-anchor="middle" font-size="12">(User Feedback)</text>

  <!-- Arrows -->
  <line x1="270" y1="120" x2="320" y2="230" stroke="black" stroke-width="2"></line>
  <line x1="270" y1="320" x2="320" y2="270" stroke="black" stroke-width="2"></line>
  <line x1="580" y1="230" x2="630" y2="120" stroke="black" stroke-width="2"></line>
  <line x1="580" y1="270" x2="630" y2="320" stroke="black" stroke-width="2"></line>

</svg>