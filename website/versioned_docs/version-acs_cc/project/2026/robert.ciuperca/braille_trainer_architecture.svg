<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#333"/>
    </marker>
  </defs>

  <rect width="960" height="560" fill="#fff"/>

  <!-- ========== MCU Central ========== -->
  <rect x="365" y="120" width="230" height="280" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="2.5"/>
  <!-- Chip icon -->
  <rect x="445" y="155" width="50" height="40" rx="3" fill="#e65100" opacity="0.15"/>
  <rect x="453" y="163" width="34" height="24" rx="2" fill="#e65100" opacity="0.3"/>
  <!-- pins left -->
  <line x1="445" y1="167" x2="438" y2="167" stroke="#e65100" stroke-width="2"/>
  <line x1="445" y1="175" x2="438" y2="175" stroke="#e65100" stroke-width="2"/>
  <line x1="445" y1="183" x2="438" y2="183" stroke="#e65100" stroke-width="2"/>
  <!-- pins right -->
  <line x1="495" y1="167" x2="502" y2="167" stroke="#e65100" stroke-width="2"/>
  <line x1="495" y1="175" x2="502" y2="175" stroke="#e65100" stroke-width="2"/>
  <line x1="495" y1="183" x2="502" y2="183" stroke="#e65100" stroke-width="2"/>
  <!-- pins top -->
  <line x1="460" y1="155" x2="460" y2="148" stroke="#e65100" stroke-width="2"/>
  <line x1="470" y1="155" x2="470" y2="148" stroke="#e65100" stroke-width="2"/>
  <line x1="480" y1="155" x2="480" y2="148" stroke="#e65100" stroke-width="2"/>
  <!-- pins bottom -->
  <line x1="460" y1="195" x2="460" y2="202" stroke="#e65100" stroke-width="2"/>
  <line x1="470" y1="195" x2="470" y2="202" stroke="#e65100" stroke-width="2"/>
  <line x1="480" y1="195" x2="480" y2="202" stroke="#e65100" stroke-width="2"/>

  <text x="480" y="228" text-anchor="middle" font-size="16" font-weight="bold" fill="#e65100">STM32</text>
  <text x="480" y="248" text-anchor="middle" font-size="11" fill="#e65100">NUCLEO-U545RE-Q</text>

  <!-- ========== INPUTS (LEFT) ========== -->

  <!-- Blue Buttons -->
  <rect x="30" y="115" width="210" height="70" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="105" y="158" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">6 Blue Buttons</text>
  <!-- 3x2 braille dots -->
  <circle cx="175" cy="133" r="5" fill="#1565c0"/>
  <circle cx="195" cy="133" r="5" fill="#1565c0"/>
  <circle cx="175" cy="148" r="5" fill="#1565c0"/>
  <circle cx="195" cy="148" r="5" fill="#1565c0" opacity="0.3"/>
  <circle cx="175" cy="163" r="5" fill="#1565c0" opacity="0.3"/>
  <circle cx="195" cy="163" r="5" fill="#1565c0"/>
  <!-- Arrow -->
  <line x1="240" y1="150" x2="365" y2="210" class="arrow" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <text x="290" y="172" text-anchor="middle" font-size="9" fill="#666">GPIO</text>

  <!-- Red Buttons -->
  <rect x="30" y="220" width="210" height="70" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="100" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">9 Red Buttons</text>
  <!-- 3x3 grid -->
  <circle cx="172" cy="237" r="4.5" fill="#c62828"/>
  <circle cx="186" cy="237" r="4.5" fill="#c62828"/>
  <circle cx="200" cy="237" r="4.5" fill="#c62828"/>
  <circle cx="172" cy="253" r="4.5" fill="#c62828"/>
  <circle cx="186" cy="253" r="4.5" fill="#c62828"/>
  <circle cx="200" cy="253" r="4.5" fill="#c62828"/>
  <circle cx="172" cy="269" r="4.5" fill="#c62828"/>
  <circle cx="186" cy="269" r="4.5" fill="#c62828"/>
  <circle cx="200" cy="269" r="4.5" fill="#c62828"/>
  <!-- Arrow -->
  <line x1="240" y1="255" x2="365" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <text x="290" y="250" text-anchor="middle" font-size="9" fill="#666">GPIO</text>

  <!-- Yellow Button -->
  <rect x="30" y="325" width="210" height="65" rx="6" fill="#fffde7" stroke="#f9a825" stroke-width="2"/>
  <text x="105" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#f9a825">Confirm Button</text>
  <!-- Button icon -->
  <circle cx="190" cy="355" r="11" fill="#f9a825" opacity="0.3"/>
  <circle cx="190" cy="355" r="7" fill="#f9a825"/>
  <!-- Arrow -->
  <line x1="240" y1="355" x2="365" y2="310" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <text x="290" y="328" text-anchor="middle" font-size="9" fill="#666">GPIO</text>

  <!-- ========== OUTPUTS (RIGHT) ========== -->

  <!-- OLED -->
  <rect x="720" y="105" width="210" height="70" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="790" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">OLED Display</text>
  <!-- Screen icon -->
  <rect x="860" y="118" width="40" height="22" rx="2" fill="#2e7d32" opacity="0.15" stroke="#2e7d32" stroke-width="1"/>
  <text x="880" y="133" text-anchor="middle" font-size="8" fill="#2e7d32" font-weight="bold">ABC</text>
  <rect x="870" y="143" width="20" height="3" rx="1" fill="#2e7d32" opacity="0.3"/>
  <!-- Arrow -->
  <line x1="595" y1="210" x2="720" y2="145" stroke="#333" stroke-width="2" marker-end="url(#arr)" marker-start="url(#arr2)"/>
  <text x="660" y="168" text-anchor="middle" font-size="9" fill="#666">I2C</text>

  <!-- LEDs -->
  <rect x="720" y="205" width="210" height="65" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="790" y="243" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">LEDs</text>
  <!-- Green LED -->
  <ellipse cx="870" cy="225" rx="6" ry="8" fill="#4caf50"/>
  <line x1="870" y1="233" x2="870" y2="245" stroke="#888" stroke-width="1.5"/>
  <line x1="870" y1="245" x2="865" y2="250" stroke="#888" stroke-width="1.5"/>
  <line x1="870" y1="245" x2="875" y2="250" stroke="#888" stroke-width="1.5"/>
  <!-- Red LED -->
  <ellipse cx="895" cy="225" rx="6" ry="8" fill="#f44336"/>
  <line x1="895" y1="233" x2="895" y2="245" stroke="#888" stroke-width="1.5"/>
  <line x1="895" y1="245" x2="890" y2="250" stroke="#888" stroke-width="1.5"/>
  <line x1="895" y1="245" x2="900" y2="250" stroke="#888" stroke-width="1.5"/>
  <!-- Arrow -->
  <line x1="595" y1="250" x2="720" y2="238" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <text x="655" y="237" text-anchor="middle" font-size="9" fill="#666">GPIO</text>

  <!-- Solenoids -->
  <rect x="720" y="300" width="210" height="65" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="790" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">6 Solenoids</text>
  <!-- Solenoid icons (small cylinders) -->
  <rect x="855" y="310" width="8" height="18" rx="2" fill="#6a1b9a" opacity="0.5"/>
  <rect x="855" y="305" width="8" height="7" rx="2" fill="#6a1b9a"/>
  <rect x="870" y="310" width="8" height="18" rx="2" fill="#6a1b9a" opacity="0.5"/>
  <rect x="870" y="312" width="8" height="7" rx="2" fill="#6a1b9a"/>
  <rect x="885" y="310" width="8" height="18" rx="2" fill="#6a1b9a" opacity="0.5"/>
  <rect x="885" y="305" width="8" height="7" rx="2" fill="#6a1b9a"/>
  <rect x="900" y="310" width="8" height="18" rx="2" fill="#6a1b9a" opacity="0.5"/>
  <rect x="900" y="312" width="8" height="7" rx="2" fill="#6a1b9a"/>
  <!-- up arrows on raised ones -->
  <line x1="859" y1="303" x2="859" y2="298" stroke="#6a1b9a" stroke-width="1"/>
  <line x1="889" y1="303" x2="889" y2="298" stroke="#6a1b9a" stroke-width="1"/>
  <!-- label -->
  <text x="882" y="348" text-anchor="middle" font-size="7" fill="#6a1b9a">▲ ▬ ▲ ▬</text>
  <!-- Arrow -->
  <line x1="595" y1="300" x2="720" y2="330" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <text x="650" y="310" text-anchor="middle" font-size="9" fill="#666">MOSFET</text>

  <!-- Buzzer -->
  <rect x="720" y="395" width="210" height="65" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="790" y="435" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">Buzzer</text>
  <!-- Speaker icon -->
  <rect x="870" y="415" width="10" height="16" rx="1" fill="#2e7d32" opacity="0.6"/>
  <polygon points="880,411 898,401 898,445 880,435" fill="#2e7d32" opacity="0.3"/>
  <!-- Sound waves -->
  <path d="M902,415 Q908,423 902,431" stroke="#2e7d32" stroke-width="1.5" fill="none"/>
  <path d="M907,411 Q915,423 907,435" stroke="#2e7d32" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Arrow -->
  <line x1="595" y1="355" x2="720" y2="425" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <text x="650" y="388" text-anchor="middle" font-size="9" fill="#666">PWM</text>

  <!-- ========== POWER (BOTTOM) ========== -->

  <!-- USB-C -->
  <rect x="320" y="470" width="150" height="55" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="395" y="503" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">USB-C</text>
  <!-- USB icon -->
  <rect x="345" y="483" width="16" height="10" rx="3" fill="none" stroke="#c62828" stroke-width="1.5"/>
  <rect x="349" y="486" width="8" height="4" rx="1" fill="#c62828" opacity="0.4"/>
  <!-- Arrow -->
  <line x1="410" y1="470" x2="450" y2="400" stroke="#c62828" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- 5V PSU -->
  <rect x="500" y="470" width="175" height="55" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="587" y="503" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">5V 6A PSU</text>
  <!-- Power plug icon -->
  <circle cx="530" cy="495" r="9" fill="none" stroke="#c62828" stroke-width="1.5"/>
  <line x1="526" y1="491" x2="526" y2="497" stroke="#c62828" stroke-width="2"/>
  <line x1="534" y1="491" x2="534" y2="497" stroke="#c62828" stroke-width="2"/>
  <circle cx="530" cy="501" r="1.5" fill="#c62828"/>
  <!-- Arrow -->
  <line x1="650" y1="480" x2="810" y2="365" stroke="#c62828" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

</svg>
