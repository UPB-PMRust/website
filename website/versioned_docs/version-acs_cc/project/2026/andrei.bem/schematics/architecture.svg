<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="20" font-family="Arial">
    Line Follower Robot Architecture
  </text>

  <!-- IR Sensors -->
  <rect x="80" y="180" width="180" height="80" fill="#d0e6ff" stroke="black"/>
  <text x="170" y="210" text-anchor="middle" font-size="14">IR Sensor Array</text>
  <text x="170" y="230" text-anchor="middle" font-size="12">(Line Detection)</text>

  <!-- STM32 -->
  <rect x="320" y="150" width="180" height="120" fill="#d4ffd4" stroke="black"/>
  <text x="410" y="185" text-anchor="middle" font-size="14">STM32 Board</text>
  <text x="410" y="205" text-anchor="middle" font-size="12">(Control Logic)</text>

  <!-- Motor Driver -->
  <rect x="580" y="180" width="180" height="80" fill="#ffe0b3" stroke="black"/>
  <text x="670" y="210" text-anchor="middle" font-size="14">L298N Driver</text>
  <text x="670" y="230" text-anchor="middle" font-size="12">(Motor Control)</text>

  <!-- Motors -->
  <rect x="580" y="300" width="180" height="80" fill="#ffd6d6" stroke="black"/>
  <text x="670" y="330" text-anchor="middle" font-size="14">DC Motors</text>
  <text x="670" y="350" text-anchor="middle" font-size="12">(Left / Right)</text>

  <!-- Battery STM32 -->
  <rect x="320" y="320" width="180" height="60" fill="#f2f2f2" stroke="black"/>
  <text x="410" y="350" text-anchor="middle" font-size="13">Battery (STM32)</text>

  <!-- Battery Motors -->
  <rect x="580" y="420" width="180" height="60" fill="#f2f2f2" stroke="black"/>
  <text x="670" y="450" text-anchor="middle" font-size="13">Battery (Motors)</text>

  <!-- Arrows -->

  <!-- Sensors -> STM32 -->
  <line x1="260" y1="220" x2="320" y2="210" stroke="black" marker-end="url(#arrow)"/>
  <text x="290" y="200" font-size="12">GPIO</text>

  <!-- STM32 -> Driver -->
  <line x1="500" y1="210" x2="580" y2="220" stroke="black" marker-end="url(#arrow)"/>
  <text x="540" y="200" font-size="12">Control Signals</text>

  <!-- Driver -> Motors -->
  <line x1="670" y1="260" x2="670" y2="300" stroke="black" marker-end="url(#arrow)"/>

  <!-- Battery STM32 -> STM32 -->
  <line x1="410" y1="320" x2="410" y2="270" stroke="black" marker-end="url(#arrow)"/>

  <!-- Battery Motors -> Driver -->
  <line x1="670" y1="420" x2="670" y2="260" stroke="black" marker-end="url(#arrow)"/>

  <!-- Arrow definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="black"/>
    </marker>
  </defs>

</svg>