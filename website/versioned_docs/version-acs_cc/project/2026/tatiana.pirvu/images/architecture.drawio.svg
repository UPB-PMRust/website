      <root>
        <mxCell id="0"/>
        <mxCell id="1" parent="0"/>

        <!-- STM32 Center -->
        <mxCell id="stm32" value="STM32 Nucleo-U545RE&#xa;Main Controller" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#dae8fc;strokeColor=#6c8ebf;" vertex="1" parent="1">
