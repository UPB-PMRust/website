<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="100%" height="100%">
    <rect width="1000" height="700" fill="#ffffff"/>

    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#333333" />
        </marker>
        <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#d32f2f" />
        </marker>
        <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#1976d2" />
        </marker>
        
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
        </filter>
    </defs>

    <text x="500" y="40" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2c3e50">Mini Air Defence System - Wiring Schematic</text>

    <g transform="translate(50, 100)" filter="url(#shadow)">
        <rect width="150" height="80" rx="8" fill="#eceff1" stroke="#607d8b" stroke-width="2"/>
        <rect width="20" height="15" x="30" y="-15" fill="#607d8b"/>
        <rect width="20" height="15" x="100" y="-15" fill="#607d8b"/>
        <text x="75" y="35" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">LiPo Battery</text>
        <text x="75" y="55" font-family="sans-serif" font-size="14" text-anchor="middle">(7.4V / 11.1V)</text>
    </g>

    <g transform="translate(50, 300)" filter="url(#shadow)">
        <rect width="150" height="80" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
        <text x="75" y="35" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">LM2596</text>
        <text x="75" y="55" font-family="sans-serif" font-size="14" text-anchor="middle">Buck Converter</text>
        <text x="10" y="70" font-family="sans-serif" font-size="12" fill="#d32f2f">5V OUT</text>
    </g>

    <g transform="translate(400, 200)" filter="url(#shadow)">
        <rect width="200" height="280" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
        <text x="100" y="40" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">STM32 MCU</text>
        
        <text x="10" y="80" font-family="sans-serif" font-size="12">5V (VIN)</text>
        <text x="10" y="110" font-family="sans-serif" font-size="12">GND</text>
        <text x="10" y="180" font-family="sans-serif" font-size="12">UART TX/RX</text>

        <text x="190" y="80" font-family="sans-serif" font-size="12" text-anchor="end">Trig (GPIO)</text>
        <text x="190" y="110" font-family="sans-serif" font-size="12" text-anchor="end">Echo (EXTI/TIM)</text>
        <text x="190" y="180" font-family="sans-serif" font-size="12" text-anchor="end">PWM 1 (Pan)</text>
        <text x="190" y="210" font-family="sans-serif" font-size="12" text-anchor="end">PWM 2 (Tilt)</text>
        <text x="190" y="250" font-family="sans-serif" font-size="12" text-anchor="end">Logic (IN1-IN4)</text>
    </g>

    <g transform="translate(750, 100)" filter="url(#shadow)">
        <rect width="160" height="80" rx="8" fill="#f3e5f5" stroke="#8e24aa" stroke-width="2"/>
        <circle cx="40" cy="40" r="20" fill="#e1bee7" stroke="#8e24aa"/>
        <circle cx="120" cy="40" r="20" fill="#e1bee7" stroke="#8e24aa"/>
        <text x="80" y="45" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">HC-SR04</text>
    </g>

    <g transform="translate(750, 250)" filter="url(#shadow)">
        <rect width="160" height="90" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
        <text x="80" y="30" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Servomotors</text>
        <text x="80" y="55" font-family="sans-serif" font-size="14" text-anchor="middle">(Pan &amp; Tilt)</text>
    </g>

    <g transform="translate(400, 550)" filter="url(#shadow)">
        <rect width="200" height="100" rx="8" fill="#ffebee" stroke="#d32f2f" stroke-width="2"/>
        <text x="100" y="30" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">L298N Driver</text>
        <text x="100" y="55" font-family="sans-serif" font-size="14" text-anchor="middle">12V IN | 5V Logic</text>
        <text x="100" y="80" font-family="sans-serif" font-size="12" text-anchor="middle">OUT1 - OUT4</text>
    </g>

    <g transform="translate(750, 550)" filter="url(#shadow)">
        <rect width="160" height="100" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="2"/>
        <circle cx="40" cy="50" r="25" fill="#eeeeee" stroke="#9e9e9e"/>
        <circle cx="120" cy="50" r="25" fill="#eeeeee" stroke="#9e9e9e"/>
        <text x="80" y="90" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">DC Motors (x2)</text>
    </g>

    <g transform="translate(50, 550)" filter="url(#shadow)">
        <rect width="150" height="80" rx="8" fill="#f5f5f5" stroke="#424242" stroke-width="2"/>
        <text x="75" y="45" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">PC / Laptop</text>
        <text x="75" y="65" font-family="sans-serif" font-size="12" text-anchor="middle">(UART Terminal)</text>
    </g>

    <path d="M 125 180 L 125 300" fill="none" stroke="#d32f2f" stroke-width="3" marker-end="url(#arrow-red)"/>
    <text x="135" y="240" font-family="sans-serif" font-size="12" fill="#d32f2f" font-weight="bold">RAW V+</text>

    <path d="M 200 140 L 350 140 L 350 580 L 400 580" fill="none" stroke="#d32f2f" stroke-width="3" marker-end="url(#arrow-red)"/>
    <text x="250" y="130" font-family="sans-serif" font-size="12" fill="#d32f2f" font-weight="bold">High Current V+ (12V)</text>

    <path d="M 200 340 L 400 340" fill="none" stroke="#ff8f00" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="250" y="330" font-family="sans-serif" font-size="12" fill="#ff8f00" font-weight="bold">5V Regulated</text>

    <path d="M 125 380 L 125 500 L 830 500 L 830 340" fill="none" stroke="#ff8f00" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="450" y="490" font-family="sans-serif" font-size="12" fill="#ff8f00" font-weight="bold">5V Regulated Power to Servos</text>

    <path d="M 600 240 L 675 240 L 675 140 L 750 140" fill="none" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="615" y="230" font-family="sans-serif" font-size="12" fill="#1976d2">Trig / Echo</text>

    <path d="M 600 295 L 750 295" fill="none" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="630" y="285" font-family="sans-serif" font-size="12" fill="#1976d2">PWM Signals</text>

    <path d="M 500 480 L 500 550" fill="none" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="510" y="520" font-family="sans-serif" font-size="12" fill="#1976d2">Logic (IN1-4)</text>

    <path d="M 600 600 L 750 600" fill="none" stroke="#388e3c" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="630" y="590" font-family="sans-serif" font-size="12" fill="#388e3c" font-weight="bold">Motor Drive</text>

    <path d="M 200 590 L 300 590 L 300 420 L 400 420" fill="none" stroke="#8e24aa" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
    <text x="210" y="580" font-family="sans-serif" font-size="12" fill="#8e24aa">UART TX/RX</text>

    <g transform="translate(50, 10)">
        <rect width="180" height="70" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
        <text x="10" y="20" font-family="sans-serif" font-size="12" font-weight="bold">Legend:</text>
        <line x1="10" y1="35" x2="40" y2="35" stroke="#d32f2f" stroke-width="3"/>
        <text x="50" y="40" font-family="sans-serif" font-size="10">Raw / Motor Power</text>
        
        <line x1="10" y1="55" x2="40" y2="55" stroke="#ff8f00" stroke-width="3"/>
        <text x="50" y="60" font-family="sans-serif" font-size="10">Regulated 5V Logic</text>
    </g>
</svg>
