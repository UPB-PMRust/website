<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 500" width="100%" height="100%">
  <defs>
    <style>
      .box { fill: #f8f9fa; stroke: #343a40; stroke-width: 2.5; rx: 8; ry: 8; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; fill: #212529; text-anchor: middle; font-weight: 500; }
      .text-small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; font-size: 12px; fill: #495057; text-anchor: middle; }
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; font-size: 22px; font-weight: bold; fill: #212529; }
      .arrow { stroke: #495057; stroke-width: 2.5; fill: none; }
      .power-arrow { stroke: #e03131; stroke-width: 2.5; fill: none; stroke-dasharray: 5, 5; }
      .arrow-head { fill: #495057; }
      .power-arrow-head { fill: #e03131; }
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; font-size: 12px; fill: #212529; text-anchor: middle; background-color: white; font-weight: bold;}
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head" />
    </marker>
    <marker id="powerarrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="power-arrow-head" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <rect x="50" y="80" width="160" height="60" class="box" />
  <text x="130" y="105" class="text">HC-SR04 Sensor</text>
  <text x="130" y="125" class="text-small">Ultrasonic Distance</text>

  <rect x="50" y="220" width="160" height="60" class="box" />
  <text x="130" y="245" class="text">LiPo Battery</text>
  <text x="130" y="265" class="text-small">7.4V Power Source</text>

  <rect x="50" y="360" width="160" height="60" class="box" />
  <text x="130" y="385" class="text">LM2596 Step-Down</text>
  <text x="130" y="405" class="text-small">5V Regulator</text>

  <rect x="350" y="210" width="150" height="80" class="box" />
  <text x="425" y="245" class="text">STM32 Nucleo</text>
  <text x="425" y="265" class="text-small">Microcontroller</text>

  <rect x="640" y="80" width="160" height="60" class="box" />
  <text x="720" y="105" class="text">MG996R Servos</text>
  <text x="720" y="125" class="text-small">Pan &amp; Tilt Aiming</text>

  <rect x="640" y="220" width="160" height="60" class="box" />
  <text x="720" y="245" class="text">Motor Driver</text>
  <text x="720" y="265" class="text-small">L298N / L293D</text>

  <rect x="640" y="360" width="160" height="60" class="box" />
  <text x="720" y="385" class="text">DC Motors (x2)</text>
  <text x="720" y="405" class="text-small">Flywheel Launcher</text>

  <path d="M 210 110 L 425 110 L 425 210" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="310" y="100" class="label">Trig / Echo (GPIO)</text>

  <path d="M 500 230 L 570 230 L 570 110 L 640 110" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="570" y="95" class="label">PWM Signals</text>

  <path d="M 500 250 L 640 250" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="570" y="240" class="label">Digital Pins</text>

  <path d="M 720 280 L 720 360" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="760" y="325" class="label">Power &amp; Control</text>

  <path d="M 130 280 L 130 360" class="power-arrow" marker-end="url(#powerarrowhead)"/>
  <text x="95" y="325" class="label" fill="#e03131">7.4V</text>

  <path d="M 210 250 L 640 250" class="power-arrow" marker-end="url(#powerarrowhead)"/>
  <text x="280" y="240" class="label" fill="#e03131">7.4V Raw</text>

  <path d="M 210 390 L 800 390 L 800 50 L 720 50 L 720 80" class="power-arrow" marker-end="url(#powerarrowhead)"/>
  <text x="425" y="380" class="label" fill="#e03131">5V Safe Power for Servos</text>
  
  <path d="M 425 390 L 425 290" class="power-arrow" marker-end="url(#powerarrowhead)"/>
  <text x="450" y="335" class="label" fill="#e03131">5V</text>

</svg>
