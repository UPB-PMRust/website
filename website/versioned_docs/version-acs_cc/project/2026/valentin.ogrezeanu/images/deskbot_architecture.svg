<svg width="1024" height="768" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>DeskBot architecture diagram</title>
<desc>Three-column architecture: inputs on left (handheld remote, sensor array, power supply), STM32 microcontroller in center running Embassy and Rust, outputs on right (locomotion, OLED display, servo system, wireless TX).</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; font-weight: 400; fill: #444; }
    .arr { stroke: #555; stroke-width: 1.5; fill: none; }
    .teal-fill { fill: #e1f5ee; stroke: #0f6e56; }
    .blue-fill  { fill: #e6f1fb; stroke: #185fa5; }
    .purple-fill{ fill: #eeedfe; stroke: #534ab7; }
    .teal-text  { fill: #085041; }
    .teal-sub   { fill: #0f6e56; }
    .blue-text  { fill: #0c447c; }
    .blue-sub   { fill: #185fa5; }
    .purple-text{ fill: #3c3489; }
    .purple-sub { fill: #534ab7; }
    .label-box  { fill: #f8f8f6; stroke: #ccc; stroke-width: 0.5; }
    .label-text { font-size: 11px; fill: #333; font-family: Arial, sans-serif; }
    .divider    { stroke: #185fa5; stroke-width: 0.5; opacity: 0.4; }
  </style>
</defs>

<!-- LEFT COLUMN -->
<rect class="teal-fill" x="15" y="56" width="155" height="48" rx="8" stroke-width="0.5"/>
<text class="th teal-text" x="92" y="74" text-anchor="middle" dominant-baseline="central">Handheld remote</text>
<text class="ts teal-sub" x="92" y="92" text-anchor="middle" dominant-baseline="central">IMU + nRF24L01</text>

<rect class="teal-fill" x="15" y="186" width="155" height="48" rx="8" stroke-width="0.5"/>
<text class="th teal-text" x="92" y="204" text-anchor="middle" dominant-baseline="central">Sensor array</text>
<text class="ts teal-sub" x="92" y="222" text-anchor="middle" dominant-baseline="central">HC-SR04, IR, LDR, mic</text>

<rect class="teal-fill" x="15" y="326" width="155" height="48" rx="8" stroke-width="0.5"/>
<text class="th teal-text" x="92" y="344" text-anchor="middle" dominant-baseline="central">Power supply</text>
<text class="ts teal-sub" x="92" y="362" text-anchor="middle" dominant-baseline="central">Li-Po battery</text>

<!-- CENTER - STM32 -->
<rect class="blue-fill" x="215" y="30" width="195" height="360" rx="12" stroke-width="0.5"/>
<text class="th blue-text" x="312" y="80" text-anchor="middle" dominant-baseline="central">STM32</text>
<text class="ts blue-sub" x="312" y="100" text-anchor="middle" dominant-baseline="central">Nucleo-U545RE-Q</text>
<text class="ts blue-sub" x="312" y="118" text-anchor="middle" dominant-baseline="central">Embassy + Rust</text>
<line class="divider" x1="230" y1="138" x2="394" y2="138"/>
<text class="ts blue-sub" x="312" y="175" text-anchor="middle" dominant-baseline="central">State machine</text>
<text class="ts blue-sub" x="312" y="205" text-anchor="middle" dominant-baseline="central">Mood engine</text>
<text class="ts blue-sub" x="312" y="235" text-anchor="middle" dominant-baseline="central">PID controller</text>
<text class="ts blue-sub" x="312" y="265" text-anchor="middle" dominant-baseline="central">Gesture FSM</text>
<text class="ts blue-sub" x="312" y="295" text-anchor="middle" dominant-baseline="central">Sound tracker</text>

<!-- RIGHT COLUMN -->
<rect class="purple-fill" x="455" y="56" width="185" height="48" rx="8" stroke-width="0.5"/>
<text class="th purple-text" x="547" y="74" text-anchor="middle" dominant-baseline="central">Locomotion</text>
<text class="ts purple-sub" x="547" y="92" text-anchor="middle" dominant-baseline="central">H-bridge + DC motors</text>

<rect class="purple-fill" x="455" y="148" width="185" height="48" rx="8" stroke-width="0.5"/>
<text class="th purple-text" x="547" y="166" text-anchor="middle" dominant-baseline="central">OLED display</text>
<text class="ts purple-sub" x="547" y="184" text-anchor="middle" dominant-baseline="central">Face + dashboard</text>

<rect class="purple-fill" x="455" y="240" width="185" height="48" rx="8" stroke-width="0.5"/>
<text class="th purple-text" x="547" y="258" text-anchor="middle" dominant-baseline="central">Servo system</text>
<text class="ts purple-sub" x="547" y="276" text-anchor="middle" dominant-baseline="central">Sweep + arm</text>

<rect class="purple-fill" x="455" y="332" width="185" height="48" rx="8" stroke-width="0.5"/>
<text class="th purple-text" x="547" y="350" text-anchor="middle" dominant-baseline="central">Wireless TX</text>
<text class="ts purple-sub" x="547" y="368" text-anchor="middle" dominant-baseline="central">Telemetry to handheld</text>

<!-- ARROWS LEFT → CENTER -->
<line class="arr" x1="170" y1="80" x2="213" y2="80" marker-end="url(#arrow)" stroke="#0f6e56"/>
<rect class="label-box" x="158" y="65" width="84" height="15" rx="3"/>
<text class="label-text" x="200" y="72" text-anchor="middle" dominant-baseline="central">Wireless cmd</text>

<line class="arr" x1="170" y1="210" x2="213" y2="210" marker-end="url(#arrow)" stroke="#0f6e56"/>
<rect class="label-box" x="158" y="195" width="80" height="15" rx="3"/>
<text class="label-text" x="198" y="202" text-anchor="middle" dominant-baseline="central">Sensor data</text>

<line class="arr" x1="170" y1="350" x2="213" y2="350" marker-end="url(#arrow)" stroke="#0f6e56"/>
<rect class="label-box" x="162" y="335" width="68" height="15" rx="3"/>
<text class="label-text" x="196" y="342" text-anchor="middle" dominant-baseline="central">3.3V / 5V</text>

<!-- ARROWS CENTER → RIGHT -->
<line class="arr" x1="410" y1="80" x2="453" y2="80" marker-end="url(#arrow)" stroke="#534ab7"/>
<rect class="label-box" x="398" y="65" width="80" height="15" rx="3"/>
<text class="label-text" x="438" y="72" text-anchor="middle" dominant-baseline="central">PWM signals</text>

<line class="arr" x1="410" y1="172" x2="453" y2="172" marker-end="url(#arrow)" stroke="#534ab7"/>
<rect class="label-box" x="406" y="157" width="60" height="15" rx="3"/>
<text class="label-text" x="436" y="164" text-anchor="middle" dominant-baseline="central">I2C data</text>

<line class="arr" x1="410" y1="264" x2="453" y2="264" marker-end="url(#arrow)" stroke="#534ab7"/>
<rect class="label-box" x="398" y="249" width="80" height="15" rx="3"/>
<text class="label-text" x="438" y="256" text-anchor="middle" dominant-baseline="central">PWM signals</text>

<line class="arr" x1="410" y1="356" x2="453" y2="356" marker-end="url(#arrow)" stroke="#534ab7"/>
<rect class="label-box" x="400" y="341" width="68" height="15" rx="3"/>
<text class="label-text" x="434" y="348" text-anchor="middle" dominant-baseline="central">SPI / nRF</text>
</svg>
