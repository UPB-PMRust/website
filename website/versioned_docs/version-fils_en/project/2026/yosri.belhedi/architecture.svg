<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="520" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>WiFi-Controlled RGB LED System Architecture</title>
<desc>Block diagram showing Raspberry Pi Pico W connected to RGB LED, photoresistor, and browser via WiFi</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
  text { font-family: Arial, sans-serif; fill: #2C2C2A; }
  .th  { font-size: 14px; font-weight: 600; }
  .ts  { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
  .leader { stroke: #5F5E5A; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }
</style>
</defs>

<!-- Background -->
<rect width="680" height="520" fill="#FAFAF8"/>

<!-- Outer Pico W container -->
<rect x="160" y="110" width="360" height="300" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="340" y="138" text-anchor="middle" fill="#3C3489">Raspberry Pi Pico W</text>

<!-- WiFi Task box -->
<rect x="182" y="158" width="140" height="68" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="th" x="252" y="181" text-anchor="middle" fill="#085041">WiFi task</text>
<text class="ts" x="252" y="197" text-anchor="middle" fill="#0F6E56">picoserve HTTP server</text>
<text class="ts" x="252" y="213" text-anchor="middle" fill="#0F6E56">POST /color /mode</text>

<!-- LED Task box -->
<rect x="358" y="158" width="140" height="68" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text class="th" x="428" y="181" text-anchor="middle" fill="#712B13">LED task</text>
<text class="ts" x="428" y="197" text-anchor="middle" fill="#993C1D">PWM R / G / B</text>
<text class="ts" x="428" y="213" text-anchor="middle" fill="#993C1D">Animation engine</text>

<!-- Shared State box -->
<rect x="248" y="272" width="184" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text class="th" x="340" y="297" text-anchor="middle" fill="#633806">Shared state</text>
<text class="ts" x="340" y="313" text-anchor="middle" fill="#854F0B">Mutex&lt;LedState&gt; — color, mode</text>

<!-- ADC Task box -->
<rect x="248" y="368" width="184" height="22" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="340" y="383" text-anchor="middle" fill="#5F5E5A">ADC task — photoresistor</text>

<!-- Arrows inside Pico W -->
<line x1="252" y1="226" x2="300" y2="272" class="arr" marker-end="url(#arrow)" stroke="#0F6E56"/>
<line x1="428" y1="226" x2="390" y2="272" class="arr" marker-end="url(#arrow)" stroke="#993C1D"/>
<line x1="340" y1="368" x2="340" y2="332" class="arr" marker-end="url(#arrow)" stroke="#888780"/>

<!-- Browser -->
<rect x="18" y="210" width="112" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text class="th" x="74" y="233" text-anchor="middle" fill="#0C447C">Browser</text>
<text class="ts" x="74" y="249" text-anchor="middle" fill="#185FA5">color picker</text>
<text class="ts" x="74" y="262" text-anchor="middle" fill="#185FA5">mode buttons</text>

<!-- WiFi arrows: Browser ↔ WiFi Task -->
<line x1="130" y1="232" x2="182" y2="210" class="arr" marker-end="url(#arrow)" stroke="#185FA5"/>
<line x1="182" y1="226" x2="130" y2="248" class="arr" marker-end="url(#arrow)" stroke="#185FA5"/>
<text class="ts" x="154" y="208" text-anchor="middle" fill="#185FA5">WiFi</text>

<!-- RGB LED -->
<rect x="550" y="210" width="110" height="60" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text class="th" x="605" y="233" text-anchor="middle" fill="#712B13">RGB LED</text>
<text class="ts" x="605" y="249" text-anchor="middle" fill="#993C1D">R / G / B</text>
<text class="ts" x="605" y="262" text-anchor="middle" fill="#993C1D">common cathode</text>

<!-- LED Task → RGB LED -->
<line x1="498" y1="226" x2="550" y2="230" class="arr" marker-end="url(#arrow)" stroke="#993C1D"/>
<text class="ts" x="527" y="218" text-anchor="middle" fill="#993C1D">PWM</text>

<!-- Photoresistor -->
<rect x="550" y="368" width="110" height="42" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="605" y="385" text-anchor="middle" fill="#444441">Photoresistor</text>
<text class="ts" x="605" y="401" text-anchor="middle" fill="#5F5E5A">GP26 / ADC0</text>

<!-- Photoresistor → ADC Task -->
<line x1="550" y1="384" x2="432" y2="378" class="arr" marker-end="url(#arrow)" stroke="#888780"/>

<!-- Legend -->
<text class="ts" x="40" y="476" fill="#5F5E5A">Legend:</text>
<rect x="90" y="466" width="10" height="10" rx="2" fill="#0F6E56"/>
<text class="ts" x="106" y="476" fill="#5F5E5A">WiFi / HTTP</text>
<rect x="192" y="466" width="10" height="10" rx="2" fill="#993C1D"/>
<text class="ts" x="208" y="476" fill="#5F5E5A">PWM signal</text>
<rect x="294" y="466" width="10" height="10" rx="2" fill="#BA7517"/>
<text class="ts" x="310" y="476" fill="#5F5E5A">Shared state (Mutex)</text>
<rect x="440" y="466" width="10" height="10" rx="2" fill="#888780"/>
<text class="ts" x="456" y="476" fill="#5F5E5A">ADC / analog</text>
</svg>
