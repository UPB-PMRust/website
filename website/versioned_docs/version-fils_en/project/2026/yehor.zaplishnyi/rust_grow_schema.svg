<svg width="680" height="640" viewBox="0 0 720 600" xmlns="http://www.w3.org/2000/svg" style="background:white;font-family:Arial,sans-serif">
  <title>Rust-Grow greenhouse automation block diagram</title>
  <desc>STM32F401RE central controller with sensors, LCD, relay actuators, buzzer, float switch, and Python web interface.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text font-size="16" font-weight="500" fill="#1a1a1a" x="360" y="26" text-anchor="middle">Rust-Grow — STM32F401RE Block Diagram</text>

  <!-- Central controller (purple) -->
  <g>
    <rect x="270" y="255" width="180" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#3C3489" x="360" y="279" text-anchor="middle" dominant-baseline="central">STM32F401RE</text>
    <text font-size="12" fill="#534AB7" x="360" y="298" text-anchor="middle" dominant-baseline="central">Central controller (Rust)</text>
  </g>

  <!-- Python Web Server (blue, top center) -->
  <g>
    <rect x="270" y="45" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#0C447C" x="360" y="67" text-anchor="middle" dominant-baseline="central">Python Web Server</text>
    <text font-size="12" fill="#185FA5" x="360" y="85" text-anchor="middle" dominant-baseline="central">FastAPI + pyserial (UART)</text>
  </g>
  <!-- UART bidirectional arrow -->
  <line x1="360" y1="255" x2="360" y2="101" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="355" y1="101" x2="355" y2="255" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- LEFT SIDE: Actuators & Alerts -->

  <!-- Buzzer -->
  <g>
    <rect x="44" y="60" width="150" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#712B13" x="119" y="78" text-anchor="middle" dominant-baseline="central">Buzzer</text>
    <text font-size="12" fill="#993C1D" x="119" y="96" text-anchor="middle" dominant-baseline="central">D10 (PB6) — alerts</text>
  </g>

  <!-- LCD 1602 -->
  <g>
    <rect x="44" y="140" width="150" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#0C447C" x="119" y="158" text-anchor="middle" dominant-baseline="central">LCD 1602</text>
    <text font-size="12" fill="#185FA5" x="119" y="176" text-anchor="middle" dominant-baseline="central">4-bit bus, D2–D7</text>
  </g>

  <!-- Fan Relay -->
  <g>
    <rect x="44" y="230" width="150" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#633806" x="119" y="248" text-anchor="middle" dominant-baseline="central">Fan Relay</text>
    <text font-size="12" fill="#854F0B" x="119" y="266" text-anchor="middle" dominant-baseline="central">A1 (PA1) — cooling</text>
  </g>

  <!-- Pump Relay -->
  <g>
    <rect x="44" y="310" width="150" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#633806" x="119" y="328" text-anchor="middle" dominant-baseline="central">Pump Relay</text>
    <text font-size="12" fill="#854F0B" x="119" y="346" text-anchor="middle" dominant-baseline="central">A3 (PB0) — irrigation</text>
  </g>

  <!-- Screen Button -->
  <g>
    <rect x="44" y="390" width="150" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#712B13" x="119" y="408" text-anchor="middle" dominant-baseline="central">Screen Button</text>
    <text font-size="12" fill="#993C1D" x="119" y="426" text-anchor="middle" dominant-baseline="central">D11 (PA7) — LCD cycle</text>
  </g>

  <!-- Float Switch -->
  <g>
    <rect x="44" y="470" width="150" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#712B13" x="119" y="488" text-anchor="middle" dominant-baseline="central">Float Switch</text>
    <text font-size="12" fill="#993C1D" x="119" y="506" text-anchor="middle" dominant-baseline="central">A5 (PC0) — water level</text>
  </g>

  <!-- Arrows: controller -> left side -->
  <path d="M270 263 L210 263 L210 82 L194 82" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M270 265 L210 265 L210 162 L194 162" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M270 275 L210 275 L210 252 L194 252" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M270 280 L210 280 L210 332 L194 332" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M270 295 L210 295 L210 412 L194 412" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M270 300 L210 300 L210 492 L194 492" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- RIGHT SIDE: Sensors -->

  <!-- DHT11 -->
  <g>
    <rect x="526" y="45" width="170" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="611" y="67" text-anchor="middle" dominant-baseline="central">DHT11</text>
    <text font-size="12" fill="#0F6E56" x="611" y="85" text-anchor="middle" dominant-baseline="central">D8 (PA9) — air temp/humidity</text>
  </g>

  <!-- NTC Thermistor -->
  <g>
    <rect x="526" y="123" width="170" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="611" y="145" text-anchor="middle" dominant-baseline="central">NTC Thermistor</text>
    <text font-size="12" fill="#0F6E56" x="611" y="163" text-anchor="middle" dominant-baseline="central">D12 (PA6) — soil temp</text>
  </g>

  <!-- Soil Moisture Sensor -->
  <g>
    <rect x="526" y="201" width="170" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="611" y="223" text-anchor="middle" dominant-baseline="central">Soil Moisture</text>
    <text font-size="12" fill="#0F6E56" x="611" y="241" text-anchor="middle" dominant-baseline="central">D13 (PA5) — analog %</text>
  </g>

  <!-- APDS9930 -->
  <g>
    <rect x="526" y="279" width="170" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="611" y="301" text-anchor="middle" dominant-baseline="central">APDS9930</text>
    <text font-size="12" fill="#0F6E56" x="611" y="319" text-anchor="middle" dominant-baseline="central">D14/D15 (I2C) — lux</text>
  </g>

  <!-- Sensor bus line at x=510 -->
  <path d="M526 73 L492 73 L492 285" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M526 151 L492 151 L492 285" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M526 229 L492 229 L492 285" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M526 307 L492 307 L492 290" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="492" y1="288" x2="450" y2="288" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 5V Power supply (gray, bottom center) -->
  <g>
    <rect x="270" y="530" width="180" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#444441" x="360" y="548" text-anchor="middle" dominant-baseline="central">5V Power Supply</text>
    <text font-size="12" fill="#5F5E5A" x="360" y="566" text-anchor="middle" dominant-baseline="central">Powers all modules</text>
  </g>
  <line x1="360" y1="530" x2="360" y2="315" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <line x1="44" y1="580" x2="70" y2="580" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#555" x="76" y="584">Data / control</text>
  <rect x="196" y="574" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="12" fill="#555" x="210" y="584">Sensors</text>
  <rect x="276" y="574" width="10" height="10" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="12" fill="#555" x="290" y="584">Inputs / Alerts</text>
  <rect x="386" y="574" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="12" fill="#555" x="400" y="584">Actuators</text>
  <rect x="470" y="574" width="10" height="10" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="12" fill="#555" x="484" y="584">Display / Web</text>
</svg>
