  .comp-orange { fill: #fce8a0; stroke: #b8860b; stroke-width: 1; }
  .comp-big { fill: #fdf2a8; stroke: #b8860b; stroke-width: 1; }
  .lbl { font-family: 'Helvetica', sans-serif; font-size: 8px; fill: #1a1a1a; }
  .lbl-name { font-family: 'Helvetica', sans-serif; font-size: 9px; font-weight: 700; fill: #1a1a1a; }
  .lbl-small { font-family: 'Helvetica', sans-serif; font-size: 7px; fill: #444; }
  .pin { font-family: 'Helvetica', sans-serif; font-size: 7px; fill: #333; }
  .ref { font-family: 'Helvetica', sans-serif; font-size: 7px; fill: #1a1a1a; }
  .title-text { font-family: 'Helvetica', sans-serif; font-size: 9px; fill: #1a1a1a; }
  .title-bold { font-family: 'Helvetica', sans-serif; font-size: 11px; font-weight: 700; fill: #1a1a1a; }
  .node { fill: #2a7d2e; }
</style>

<rect x="0" y="0" width="1024" height="768" fill="#ffffff"/>
