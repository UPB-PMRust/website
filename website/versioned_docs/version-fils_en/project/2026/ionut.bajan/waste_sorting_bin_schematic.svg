<path class="wire" d="M 50 205 L 20 205 L 20 275 L 380 275"/>
<path class="wire" d="M 50 220 L 25 220 L 25 295 L 380 295"/>

<!-- ESP32 right pins to STM32 (control lines) -->
<path class="wire" d="M 215 235 L 270 235 L 270 315 L 380 315"/>
<path class="wire" d="M 215 255 L 265 255 L 265 335 L 380 335"/>

<!-- ESP32 GPIO0/4 to STM32 -->
<path class="wire" d="M 50 240 L 15 240 L 15 375 L 380 375"/>
<path class="wire" d="M 50 260 L 18 260 L 18 395 L 380 395"/>

<!-- J6 (SD Card) to ESP32 right side and to STM32 -->
<path class="wire" d="M 140 388 L 220 388 L 220 235 L 215 235"/>
