<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="768" viewBox="0 0 1024 768">
<style>
  .wire { stroke: #2a7d2e; stroke-width: 1.4; fill: none; }
