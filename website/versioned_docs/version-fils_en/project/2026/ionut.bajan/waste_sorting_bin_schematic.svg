<path class="wire" d="M 225 67 L 280 67"/>
<path class="wire" d="M 280 67 L 280 175 L 380 175"/>
<circle cx="280" cy="67" r="2" class="node"/>
<path class="wire" d="M 280 67 L 280 30 L 700 30 L 700 120 L 780 120"/>
<circle cx="280" cy="30" r="1.8" class="node"/>
<circle cx="700" cy="120" r="1.8" class="node"/>
<path class="wire" d="M 700 120 L 700 205 L 780 205"/>
<path class="wire" d="M 700 120 L 720 120 L 720 478 L 780 478"/>
<circle cx="720" cy="120" r="1.8" class="node"/>
<circle cx="700" cy="205" r="2" class="node"/>

<!-- 5V also feeds ESP32 -->
<path class="wire" d="M 280 67 L 280 175 L 50 175"/>

<!-- GND - capacitor to ground rail -->
<path class="wire" d="M 197 79 L 197 100 L 250 100 L 250 720"/>
